<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="All categories of dental tools and supplies">
  <title>Categories - Crown Dental Store</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="images/logo/crown-chatbot-icon.png">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="navbar-container container">
      <div class="navbar-brand">
        <img src="images/logo/crown-chatbot-icon.png" alt="Crown Dental Store Logo" class="navbar-logo">
        <span>Crown Dental Store</span>
      </div>

      <button class="navbar-toggle" id="navbar-toggle">☰</button>

      <ul class="navbar-nav" id="navbar-nav">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="categories.html" class="active">Categories</a></li>
        <li><a href="about-contact.html">About & Contact</a></li>
      </ul>

      <div class="navbar-icons">
        <a href="https://www.facebook.com/share/1H798BjZV2/" target="_blank" rel="noopener noreferrer" class="navbar-icon" title="Facebook" aria-label="Facebook"><img src="images/social/facebook.svg" alt="Facebook"></a>
        <a href="https://www.instagram.com/crown.dentalstore?igsh=MWJqNnlodHkzOGtucQ==" target="_blank" rel="noopener noreferrer" class="navbar-icon" title="Instagram" aria-label="Instagram"><img src="images/social/instagram.svg" alt="Instagram"></a>
      </div>
    </div>
  </nav>

  <!-- PAGE CONTENT -->
  <div class="page-content">
    <div class="container">
      <!-- BREADCRUMB -->
      <ol class="breadcrumb">
        <li><a href="index.html">Home</a></li>
        <li>Categories</li>
      </ol>

      <!-- PAGE TITLE -->
      <div style="margin-bottom: var(--spacing-2xl);">
        <h1>All Categories</h1>
        <p style="color: var(--color-text-light);">Explore all types of dental tools and supplies</p>
      </div>

      <!-- CATEGORIES GRID -->
      <div class="categories-grid" id="categories-container">
        <!-- Categories will be populated by JavaScript -->
      </div>
    </div>
  </div>

  <!-- CTA SECTION -->
  <section class="section" style="background-color: var(--color-bg-light); margin-top: var(--spacing-3xl);">
    <div class="container" style="text-align: center;">
      <h2>Can't Find What You're Looking For?</h2>
      <p style="font-size: var(--font-size-lg); margin: var(--spacing-lg) 0; color: var(--color-text-light);">Contact us and we'll help you find the right product</p>
      <a href="about-contact.html" class="btn btn-primary btn-lg">Contact Us Now</a>
    </div>
  </section>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
  <script src="js/search-enhanced.js"></script>
  <script src="js/chatbot.js"></script>
  <script>
    // Populate categories
    document.addEventListener('DOMContentLoaded', function() {
      const container = document.getElementById('categories-container');

      const html = categories.map(cat => `
        <a href="products.html?category=${encodeURIComponent(cat.nameEnglish)}" class="category-card">
          <h3>${cat.nameEnglish}</h3>
        </a>
      `).join('');

      container.innerHTML = html;
    });
  </script>
</body>
</html>
