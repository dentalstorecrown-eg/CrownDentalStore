<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse all dental tools and supplies from Crown Dental Store - Advanced filtering and product search">
  <title>Products - Crown Dental Store</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="images/logo/crown-chatbot-icon.png">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="navbar-container container">
      <div class="navbar-brand">
        <img src="images/logo/crown-chatbot-icon.png" alt="Crown Dental Store Logo" class="navbar-logo">
        <span>Crown Dental Store</span>
      </div>

      <button class="navbar-toggle" id="navbar-toggle">☰</button>

      <ul class="navbar-nav" id="navbar-nav">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html" class="active">Products</a></li>
        <li><a href="categories.html">Categories</a></li>
        <li><a href="about-contact.html">About & Contact</a></li>
      </ul>

      <div class="navbar-icons">
        <a href="https://www.facebook.com/share/1H798BjZV2/" target="_blank" rel="noopener noreferrer" class="navbar-icon" title="Facebook" aria-label="Facebook"><img src="images/social/facebook.svg" alt="Facebook"></a>
        <a href="https://www.instagram.com/crown.dentalstore?igsh=MWJqNnlodHkzOGtucQ==" target="_blank" rel="noopener noreferrer" class="navbar-icon" title="Instagram" aria-label="Instagram"><img src="images/social/instagram.svg" alt="Instagram"></a>
      </div>
    </div>
  </nav>

  <!-- PAGE CONTENT -->
  <div class="page-content">
    <div class="container">
      <!-- BREADCRUMB -->
      <ol class="breadcrumb">
        <li><a href="index.html">Home</a></li>
        <li>Products</li>
      </ol>

      <!-- PAGE TITLE -->
      <div style="margin-bottom: var(--spacing-2xl);">
        <h1>All Products</h1>
        <p id="result-count" style="color: var(--color-text-light);">Loading products...</p>
      </div>

      <!-- FILTERS AND SEARCH -->
      <div class="controls">
        <input type="text" id="search-input" placeholder="Search products or name..." style="flex: 1; max-width: 300px;">
        <button id="search-button" class="btn btn-primary">Search</button>

        <select id="category-filter" class="btn btn-outline">
          <option value="">All Categories</option>
        </select>

        <select id="sort-filter" class="btn btn-outline">
          <option value="default">Default Sort</option>
          <option value="name">Product Name (A-Z)</option>
          <option value="price-low">Price (Lowest First)</option>
          <option value="price-high">Price (Highest First)</option>
          <option value="newest">Newest First</option>
        </select>

        <button id="clear-filters" class="btn btn-outline">Clear Filters</button>
      </div>

      <!-- PRODUCTS GRID -->
      <div class="products-grid" id="products-container">
        <div style="text-align: center; grid-column: 1/-1; padding: var(--spacing-2xl);">
          <div class="spinner"></div>
          <p>Loading products...</p>
        </div>
      </div>

      <!-- PAGINATION -->
      <ul class="pagination" id="pagination"></ul>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
  <script src="js/search-enhanced.js"></script>
  <script src="js/products.js"></script>
  <script src="js/chatbot.js"></script>
</body>
</html>
